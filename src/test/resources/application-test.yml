spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/devpath}
    username: ${DB_USER:devpath}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
