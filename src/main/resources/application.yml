devpath:
  auth:
    jwt-secret: ${JWT_SECRET:test-secret-please-change-min-32-bytes-long-0123456789}
  ai-svc:
    base-url: ${AI_SVC_BASE_URL:http://localhost:8081}
    timeout: ${AI_SVC_TIMEOUT:PT8S}
  notification-svc:
    base-url: ${NOTIFICATION_SVC_BASE_URL:http://localhost:8088}
    timeout: ${NOTIFICATION_SVC_TIMEOUT:PT5S}
  content:
    completion:
      scroll-threshold: ${CONTENT_COMPLETION_SCROLL_THRESHOLD:0.8}
      min-dwell-sec: ${CONTENT_COMPLETION_MIN_DWELL_SEC:45}

spring:
  application:
    name: devpath-learning-svc
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/devpath}
    username: ${DB_USER:devpath}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false   # 마이그레이션은 devpath-shared(중앙)에서 실행, 서비스는 validate만
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: devpath-learning
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
